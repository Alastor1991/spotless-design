<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotless — стилевые направления</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;600;700&family=Nunito+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="lib/design-canvas.jsx"></script>
<script type="text/babel" src="lib/shared.jsx"></script>
<script type="text/babel" src="lib/dir-a.jsx"></script>
<script type="text/babel" src="lib/dir-b.jsx"></script>
<script type="text/babel" src="lib/dir-c.jsx"></script>
<script type="text/babel" src="lib/tokens.jsx"></script>
<script type="text/babel">
const App = () => (
  <DesignCanvas>
    <DCSection id="dir-a" title="A · Тёплая бумага" subtitle="Тёмная тёплая · Golos Text · мягкие заливки · показан поповер оценки 1–10">
      <DCArtboard id="a-screen" label="Главная · десктоп · RU" width={1440} height={900}>
        <DirectionA />
      </DCArtboard>
      <DCArtboard id="a-tokens" label="Токены" width={400} height={900}>
        <TokenCard spec={TOKENS_A} />
      </DCArtboard>
    </DCSection>

    <DCSection id="dir-b" title="B · Студия" subtitle="Тёмная нейтральная · Source Sans 3 + mono · тонкие линии, плотнее · приветы продвинутым">
      <DCArtboard id="b-screen" label="Главная · десктоп · RU" width={1440} height={900}>
        <DirectionB />
      </DCArtboard>
      <DCArtboard id="b-tokens" label="Токены" width={400} height={900}>
        <TokenCard spec={TOKENS_B} />
      </DCArtboard>
    </DCSection>

    <DCSection id="dir-c" title="C · Солнечная" subtitle="Светлая кремовая · Nunito Sans · капсулы · интерфейс на английском">
      <DCArtboard id="c-screen" label="Home · desktop · EN" width={1440} height={900}>
        <DirectionC />
      </DCArtboard>
      <DCArtboard id="c-tokens" label="Токены" width={400} height={900}>
        <TokenCard spec={TOKENS_C} />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
